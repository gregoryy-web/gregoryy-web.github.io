<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DigiDex | Digital Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4 fw-bold text-primary">DAPI: Digimon API</h1>
                
                <div class="input-group mb-4 shadow-sm">
                    <input type="text" id="digimonSearchInput" class="form-control" placeholder="Enter ID (e.g., 1) or Name...">
                    <button class="btn btn-primary" type="button" id="searchSubmitBtn">Search</button>
                </div>

                <div id="digimonCardResult" class="d-flex justify-content-center">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
