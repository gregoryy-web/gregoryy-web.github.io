<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DigiDex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <div class="container-fluid py-4 px-lg-5">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="sidebar-card p-4 shadow-sm text-center">
                    <h2 class="h4 mb-4 fw-bold">DigiDex</h2>
                    <div class="mb-3">
                        <input type="text" id="digimonSearchInput" class="form-control rounded-3" placeholder="Name or Number">
                    </div>
                    <div class="mb-4">
                        <select class="form-select rounded-3" id="typeFilter">
                            <option value="" selected>Attribute</option>
                            <option value="Vaccine">Vaccine</option>
                            <option value="Data">Data</option>
                            <option value="Virus">Virus</option>
                            <option value="Free">Free</option>
                            <option value="Variable">Variable</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-clear px-4" type="button" id="clearBtn">Clear</button>
                        <button class="btn btn-search px-4" type="button" id="searchSubmitBtn">Search</button>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <div class="results-container p-4 bg-white shadow-sm rounded-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold m-0">Digimons</h2>
                        <button class="btn btn-dark rounded-pill px-4 shadow-sm" id="homeBtn">Home</button>
                    </div>

                    <div id="digimonCardResult" class="d-flex flex-column gap-3">
                        </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
